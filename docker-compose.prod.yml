services:
  app:
    build: .
    container_name: calipso-coffee-prod
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: file:/data/dev.db
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - calipso_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  calipso_prod_data:
